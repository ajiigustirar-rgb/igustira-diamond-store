    // 2. FUNGSI PENYIMPANAN FIREBASE (DIPANGGIL DI BAWAH)
    async function simpanKeFirestore(dataObj) {
        try {
            await addDoc(collection(db, "pesanan"), {
                ...dataObj,
                waktuInput: new Date()
            });
            console.log("Data backup ke Firestore sukses");
        } catch (e) {
            console.error("Gagal backup ke Firestore:", e);
        }
    }
