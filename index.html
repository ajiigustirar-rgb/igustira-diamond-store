<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGUSTIRA STORE - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background: #0b0e23; color: white; font-family: 'Orbitron', sans-serif; padding: 20px; }
        .menu-item { background: #161b33; border: 1px solid #2d3450; border-radius: 12px; padding: 15px; margin-bottom: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .form-input { background: #1f2937; border: 1px solid #374151; border-radius: 8px; padding: 10px; width: 100%; color: white; font-size: 12px; margin-bottom: 10px; outline: none; }
        .btn-send { background: #2563eb; color: white; font-weight: bold; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); justify-content: center; align-items: center; padding: 20px; z-index: 50; }
    </style>
</head>
<body>
    <div class="max-w-md mx-auto">
        <h1 class="text-2xl font-black italic text-blue-400 text-center mb-1">IGUSTIRA STORE</h1>
        <p class="text-[8px] text-gray-400 text-center mb-8 uppercase tracking-widest">Pusat Jual Beli Terpercaya Se-Asia Tenggara</p>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-slate-900 p-3 rounded-lg border border-slate-800 text-center">
                <p class="text-[8px] text-gray-500">BNB/USDT</p>
                <p id="bnb-price" class="text-xs font-bold text-yellow-500">...</p>
            </div>
            <div class="bg-slate-900 p-3 rounded-lg border border-slate-800 text-center">
                <p class="text-[8px] text-gray-500">XRP/USDT</p>
                <p id="xrp-price" class="text-xs font-bold text-blue-500">...</p>
            </div>
        </div>

        <div onclick="openModal('MLBB')" class="menu-item">
            <span class="text-xs font-bold">MOBILE LEGENDS</span>
            <div class="bg-blue-600 px-3 py-1 rounded text-[10px]">ML</div>
        </div>
        <div onclick="openModal('FREE FIRE')" class="menu-item">
            <span class="text-xs font-bold">FREE FIRE</span>
            <div class="bg-orange-600 px-3 py-1 rounded text-[10px]">FF</div>
        </div>
        <div onclick="openModal('CRYPTO')" class="menu-item">
            <span class="text-xs font-bold">CV USDT / XRP</span>
            <div class="bg-emerald-600 px-3 py-1 rounded text-[10px]">U</div>
        </div>

        <div class="mt-8 p-4 bg-blue-900/20 rounded-xl border border-blue-500/20">
            <p class="text-[9px] text-blue-400 font-bold mb-2 uppercase">Official Wallet Address:</p>
            <p class="text-[8px] text-gray-400 truncate">USDT: TCokCTEWrqgJTEpWcmSqpj5chiMH5be2o4</p>
            <p class="text-[8px] text-gray-400 truncate">XRP: rwWr7KUZ3ZFwzgaDGjKBysADByzxvohQ3C</p>
        </div>
    </div>

    <div id="orderModal" class="modal">
        <div class="bg-[#161b33] p-6 rounded-2xl w-full max-w-sm border border-blue-500/30">
            <h2 id="modalTitle" class="text-lg font-bold mb-4 text-blue-400">Order</h2>
            
            <div id="mlInputs" class="hidden">
                <input id="userId" type="text" placeholder="ID Akun" class="form-input">
                <input id="zoneId" type="text" placeholder="ID Server (Contoh: 1234)" class="form-input">
            </div>
            
            <div id="commonInputs">
                <input id="gameId" type="text" placeholder="ID Akun / Nickname" class="form-input hidden">
                <input id="nominal" type="text" placeholder="Jumlah Diamond / Crypto" class="form-input">
                <input id="harga" type="text" placeholder="Konfirmasi Harga (Rp/$)" class="form-input">
            </div>

            <button onclick="kirimWA()" class="btn-send">KIRIM PESAN KE WA</button>
            <button onclick="closeModal()" class="text-gray-500 text-xs w-full mt-4">Batal</button>
        </div>
    </div>

    <script>
        let currentProduct = '';

        function openModal(product) {
            currentProduct = product;
            document.getElementById('orderModal').style.display = 'flex';
            document.getElementById('modalTitle').innerText = 'Order ' + product;
            
            // Atur input khusus MLBB
            if(product === 'MLBB') {
                document.getElementById('mlInputs').classList.remove('hidden');
                document.getElementById('gameId').classList.add('hidden');
            } else {
                document.getElementById('mlInputs').classList.add('hidden');
                document.getElementById('gameId').classList.remove('hidden');
            }
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function kirimWA() {
            const id = document.getElementById('userId').value || document.getElementById('gameId').value;
            const server = document.getElementById('zoneId').value;
            const jumlah = document.getElementById('nominal').value;
            const harga = document.getElementById('harga').value;
            
            let pesan = `Halo Bos Igustira, Saya mau order ${currentProduct}\n\n`;
            pesan += `ID: ${id}\n`;
            if(currentProduct === 'MLBB') pesan += `Server: ${server}\n`;
            pesan += `Jumlah: ${jumlah}\n`;
            pesan += `Harga Konfirmasi: ${harga}\n\nTerima kasih.`;
            
            window.location.href = `https://wa.me/6282185160103?text=${encodeURIComponent(pesan)}`;
        }

        async function getPrices() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BNBUSDT","XRPUSDT"]');
                const d = await r.json();
                document.getElementById('bnb-price').innerText = '$' + parseFloat(d.find(i=>i.symbol==='BNBUSDT').price).toFixed(2);
                document.getElementById('xrp-price').innerText = '$' + parseFloat(d.find(i=>i.symbol==='XRPUSDT').price).toFixed(4);
            } catch(e) {}
        }
        setInterval(getPrices, 60000); getPrices();
    </script>
</body>
</html>
