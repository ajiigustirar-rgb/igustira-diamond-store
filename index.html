<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGUSTIRA STORE - OFFICIAL</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card-bg: rgba(28, 36, 55, 0.85); --sidebar: rgba(19, 26, 43, 0.9); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; min-height: 100vh; }
        .sidebar { width: 240px; background: var(--sidebar); height: 100vh; position: fixed; padding: 20px; border-right: 1px solid rgba(255,255,255,0.05); }
        .main-content { margin-left: 240px; padding: 40px; }
        .hero-section { background: linear-gradient(rgba(11,15,26,0.4), rgba(11,15,26,0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070'); padding: 60px; text-align: center; border-bottom: 3px solid var(--primary); }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: var(--card-bg); border-radius: 18px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; overflow: hidden; }
        .card:hover { transform: scale(1.05); border-color: var(--primary); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-title { padding: 15px; font-weight: 800; font-size: 13px; text-align: center; }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); padding: 20px; }
        .modal-content { background: #1c2437; margin: auto; padding: 25px; width: 100%; max-width: 460px; border-radius: 25px; border: 1px solid var(--primary); }
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #323f58; background: #0b0f1a; color: white; box-sizing: border-box; }
        .btn-panel { width: 100%; padding: 18px; background: var(--primary); color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <div style="color:var(--primary); font-weight:900; font-size:20px; margin-bottom:20px;">IGUSTIRA STORE</div>
    <div style="color:#aaa; font-size:12px;">Pusat Top Up Termurah & Terpercaya</div>
</div>

<div class="main-content">
    <div class="hero-section"><h1>IGUSTIRA STORE</h1></div>
    <div class="card-grid">
        <div class="card" onclick="openOrder('Mobile Legends')"><img src="https://via.placeholder.com/200?text=MLBB"><div class="card-title">MOBILE LEGENDS</div></div>
        <div class="card" onclick="openOrder('Free Fire')"><img src="https://via.placeholder.com/200?text=FF"><div class="card-title">FREE FIRE</div></div>
        <div class="card" onclick="openOrder('PUBG Mobile')"><img src="https://via.placeholder.com/200?text=PUBG"><div class="card-title">PUBG MOBILE</div></div>
        <div class="card" onclick="openOrder('CV USDT')"><img src="https://via.placeholder.com/200?text=USDT"><div class="card-title">CV USDT</div></div>
    </div>
</div>

<div id="modalOrder" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">Order</h2>
        <input type="text" id="inpNamaUser" placeholder="Nama Lengkap">
        <input type="text" id="inpId" placeholder="User ID / Akun">
        <button class="btn-panel" onclick="prosesKirim()">KONFIRMASI & SELESAI</button>
        <button onclick="document.getElementById('modalOrder').style.display='none'" style="background:none; border:none; color:white; width:100%; margin-top:10px;">Batal</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFZVOrLwcCjdKVWFSeNz8LVBIVxidtMkA",
        projectId: "igustira-store"
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.kirimKeDB = async (data) => {
        await addDoc(collection(db, "pesanan"), { ...data, tgl: new Date() });
    };
</script>

<script>
    let gameDipilih = "";
    function openOrder(g) { gameDipilih = g; document.getElementById('modalTitle').innerText = "Order " + g; document.getElementById('modalOrder').style.display = "block"; }

    function prosesKirim() {
        let nama = document.getElementById('inpNamaUser').value;
        let idUser = document.getElementById('inpId').value;
        
        if(!nama || !idUser) return alert("Isi semua data!");

        // Kirim ke Firebase
        kirimKeDB({ nama: nama, id: idUser, game: gameDipilih });
        
        alert("Pesanan " + gameDipilih + " berhasil diproses!");
        document.getElementById('modalOrder').style.display = "none";
    }
</script>
</body>
</html>
