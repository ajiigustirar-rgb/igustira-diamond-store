<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGUSTIRA STORE - OFFICIAL</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card-bg: #1c2437; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }

        /* Banner Header */
        .header-banner { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            padding: 35px 20px; 
            text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .header-banner h1 { margin: 0; font-size: 26px; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; color: white; }

        /* Grid Kartu */
        .container { padding: 30px 15px; max-width: 1000px; margin: auto; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }

        /* Desain Kartu */
        .card { 
            background: var(--card-bg); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 10px 20px rgba(0,255,136,0.2); }
        .card img { width: 100%; height: 180px; object-fit: cover; }
        .card-title { padding: 15px; font-weight: bold; font-size: 18px; background: #242f48; }

        /* Modal */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background: var(--card-bg); margin: 30px auto; padding: 25px; width: 90%; max-width: 400px; border-radius: 20px; border: 1px solid var(--primary); position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 28px; color: #ff4d4d; cursor: pointer; }

        /* Fitur Salin Rekening */
        .rek-box { background: white; color: black; padding: 12px; border-radius: 12px; margin: 15px 0; }
        .rek-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 13px; }
        .rek-item:last-child { border: none; }
        .copy-badge { font-size: 9px; background: var(--primary); padding: 3px 7px; border-radius: 5px; font-weight: bold; color: black; }

        /* Form */
        label { display: block; margin: 15px 0 5px; font-size: 13px; color: #a0aec0; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #323f58; background: #0b0f1a; color: white; box-sizing: border-box; }
        .price-box { background: rgba(0,255,136,0.1); padding: 15px; border-radius: 12px; text-align: center; margin: 15px 0; border: 1px dashed var(--primary); }
        .price-box b { font-size: 22px; color: var(--primary); }

        .btn-wa { width: 100%; padding: 16px; background: var(--primary); color: #000; font-weight: 900; border: none; border-radius: 12px; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header-banner">
    <h1>IGUSTIRA STORE</h1>
    <p style="margin:5px 0 0; font-size:12px; font-weight:bold; color:white;">Pusat Jual Beli Terpercaya se-Asia Tenggara</p>
</div>

<div class="container">
    <div class="card-grid">
        <div class="card" onclick="openModal('Mobile Legends', 300, 'game')">
            <img src="ml.jpg">
            <div class="card-title">MOBILE LEGENDS</div>
        </div>

        <div class="card" onclick="openModal('Free Fire', 150, 'game')">
            <img src="ff.jpg">
            <div class="card-title">FREE FIRE</div>
        </div>

        <div class="card" onclick="openModal('CV USDT (IDR)', 16200, 'usdt')">
            <img src="usdt.jpg">
            <div class="card-title">CV USDT (IDR)</div>
        </div>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle" style="color: var(--primary); margin: 0;">Order</h2>

        <div id="rekGame" style="display:none;">
            <p style="font-size: 10px; color: #a0aec0; margin: 15px 0 5px;">Klik untuk salin nomor rekening:</p>
            <div class="rek-box">
                <div class="rek-item" onclick="salin('1910432735')"><span><b>BNI:</b> 1910432735</span> <span class="copy-badge">SALIN</span></div>
                <div class="rek-item" onclick="salin('082185160103')"><span><b>DANA:</b> 082185160103</span> <span class="copy-badge">SALIN</span></div>
            </div>
        </div>

        <div id="rekUsdt" style="display:none; text-align:center;">
            <p style="font-size: 10px; color: #a0aec0; margin: 15px 0 5px;">Alamat USDT (TRC20):</p>
            <div class="rek-box" onclick="salin('TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH')" style="cursor:pointer;">
                <b style="font-size: 10px; word-break: break-all;">TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH</b><br>
                <span class="copy-badge" style="display:inline-block; margin-top:5px;">KLIK UNTUK SALIN</span>
            </div>
        </div>

        <label>Jumlah Pesanan:</label>
        <input type="number" id="jumlah" placeholder="Contoh: 100" oninput="hitung()">

        <div class="price-box">
            <small>Total Pembayaran:</small><br>
            <b id="totalText">Rp 0</b>
        </div>

        <label id="labelTarget">Data Tujuan:</label>
        <input type="text" id="target" placeholder="">
        
        <label>Upload Bukti Bayar:</label>
        <input type="file" id="bukti">

        <button class="btn-wa" onclick="kirimWA()">KONFIRMASI VIA WHATSAPP</button>
    </div>
</div>

<script>
    let rate = 0;
    let prod = "";

    function openModal(nama, harga, tipe) {
        prod = nama;
        rate = harga;
        document.getElementById('modalTitle').innerText = nama;
        document.getElementById('jumlah').value = "";
        document.getElementById('totalText').innerText = "Rp 0";
        document.getElementById('orderModal').style.display = "block";

        if(tipe === 'usdt') {
            document.getElementById('rekGame').style.display = "none";
            document.getElementById('rekUsdt').style.display = "block";
            document.getElementById('labelTarget').innerText = "Nomor Rekening/E-Wallet Tujuan:";
            document.getElementById('target').placeholder = "Contoh: DANA 0821...";
        } else {
            document.getElementById('rekGame').style.display = "block";
            document.getElementById('rekUsdt').style.display = "none";
            document.getElementById('labelTarget').innerText = "User ID & Server:";
            document.getElementById('target').placeholder = "Contoh: 12345678 (1234)";
        }
    }

    function closeModal() { document.getElementById('orderModal').style.display = "none"; }

    function hitung() {
        let v = document.getElementById('jumlah').value;
        document.getElementById('totalText').innerText = "Rp " + (v * rate).toLocaleString('id-ID');
    }

    function salin(t) {
        navigator.clipboard.writeText(t);
        alert("Nomor Berhasil Disalin!");
    }

    function kirimWA() {
        let j = document.getElementById('jumlah').value;
        let t = document.getElementById('target').value;
        let p = document.getElementById('totalText').innerText;
        if(!j || !t) return alert("Lengkapi data!");

        let waLink = `https://wa.me/6282185160103?text=Halo Bos Rangga,\n\nOrder: ${prod}\nJumlah: ${j}\nTotal Bayar: ${p}\nTarget: ${t}`;
        window.location.href = waLink;
    }

    window.onclick = function(e) { if(e.target.className === 'modal') closeModal(); }
</script>
</body>
</html>
