<h2 id="modalTitle">Order</h2>
<input type="text" id="inpNamaUser" placeholder="Nama Lengkap">
<input type="text" id="inpId" placeholder="User ID">

<select id="inpNominal">
    <option value="">Pilih Nominal / Jumlah</option>
    <option value="100">100 Diamond / USDT</option>
    <option value="500">500 Diamond / USDT</option>
</select>

<select id="inpMetode">
    <option value="">Pilih Metode Pembayaran</option>
    <option value="DANA">DANA</option>
    <option value="GOPAY">GOPAY</option>
    <option value="BANK">TRANSFER BANK</option>
</select>

<button class="btn-panel" id="btnSubmitOrder" onclick="prosesKirimPanel()">KONFIRMASI & SELESAI</button>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFZVOrLwcCjdKVWFSeNz8LVBIVxidtMkA",
        projectId: "igustira-store"
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.simpanKeFirebase = async (data) => {
        try {
            await addDoc(collection(db, "pelanggan"), { ...data, timestamp: new Date() });
        } catch(e) { console.error("Firebase Error:", e); }
    };
</script>

<script>
    function prosesKirimPanel() {
        const data = {
            nama: document.getElementById('inpNamaUser').value,
            id: document.getElementById('inpId').value,
            game: gameAktif,
            nominal: document.getElementById('inpNominal').value,
            metode: document.getElementById('inpMetode').value
        };

        // 1. Simpan ke Firebase dulu
        window.simpanKeFirebase(data);

        // 2. Lanjutkan proses ke Panel Admin asli Anda
        // Pastikan variabel URL_API_PANEL sudah terdefinisi di kode Anda
        fetch(URL_API_PANEL, {
            method: 'POST',
            body: JSON.stringify(data)
        }).then(res => res.json()).then(data => {
            if(data.status === "success") {
                alert("Pesanan Sukses Terkirim!");
                closeOrder();
            }
        }).catch(err => {
            alert("Sistem backend terdeteksi."); // Sesuai kode Anda
            closeOrder();
        });
    }
</script>
