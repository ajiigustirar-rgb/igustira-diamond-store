<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGUSTIRA STORE - OFFICIAL</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card-bg: rgba(28, 36, 55, 0.85); --accent: #7d3cf0; --sidebar: rgba(19, 26, 43, 0.9); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; position: relative; overflow-x: hidden; }
        #gaming-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .sidebar { width: 240px; background: var(--sidebar); height: 100vh; position: fixed; border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; box-sizing: border-box; display: none; z-index: 10; backdrop-filter: blur(10px); }
        .sidebar-logo { font-size: 20px; font-weight: 900; color: var(--primary); margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; text-transform: uppercase; }
        .nav-link { display: block; color: #a0aec0; text-decoration: none; padding: 12px 15px; border-radius: 10px; margin-bottom: 5px; font-weight: 600; transition: 0.3s; }
        .nav-link:hover { background: rgba(0,255,136,0.1); color: var(--primary); }
        .main-content { flex: 1; margin-left: 0; transition: 0.3s; position: relative; z-index: 1; }
        .hero-section { background: linear-gradient(rgba(11, 15, 26, 0.4), rgba(11, 15, 26, 0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070'); background-size: cover; background-position: center; padding: 60px 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .hero-section h1 { font-size: 36px; margin: 0; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 20px var(--primary); text-transform: uppercase; }
        .container { padding: 40px 20px; max-width: 1200px; margin: auto; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 18px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.4s; }
        .card:hover { transform: scale(1.05); border-color: var(--primary); }
        .card img { width: 100%; height: 140px; object-fit: cover; filter: brightness(0.7); }
        .card-title { padding: 15px; font-weight: 800; font-size: 13px; text-align: center; background: rgba(36, 47, 72, 0.9); }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: auto; padding: 20px; }
        .modal-content { background: #1c2437; margin: auto; padding: 25px; width: 100%; max-width: 460px; border-radius: 25px; border: 1px solid var(--primary); }
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #323f58; background: #0b0f1a; color: white; }
        .btn-panel { width: 100%; padding: 18px; background: var(--primary); color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">IGUSTIRA STORE</div>
    <a href="#" class="nav-link">🏠 Home</a>
    <a href="https://wa.me/6282185160103" class="nav-link">📞 Customer Service</a>
</div>

<div class="main-content">
    <div class="hero-section"><h1>IGUSTIRA STORE</h1></div>
    <div class="container">
        <div class="card-grid">
            <div class="card" onclick="openOrder('Mobile Legends')"><img src="ml.jpg"><div class="card-title">MOBILE LEGENDS</div></div>
            <div class="card" onclick="openOrder('Free Fire')"><img src="ff.jpg"><div class="card-title">FREE FIRE</div></div>
            <div class="card" onclick="openOrder('PUBG Mobile')"><img src="pubg.jpg"><div class="card-title">PUBG MOBILE</div></div>
            </div>
    </div>
</div>

<div id="modalOrder" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeOrder()" style="float:right; cursor:pointer;">&times;</span>
        <h2 id="modalTitle">Order</h2>
        <input type="text" id="inpNamaUser" placeholder="Nama Lengkap">
        <input type="email" id="inpEmailUser" placeholder="Email">
        <input type="text" id="inpId" placeholder="User ID">
        <button class="btn-panel" id="btnSubmitOrder" onclick="prosesKirimPanel()">KONFIRMASI & SELESAI</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFZVOrLwcCjdKVWFSeNz8LVBIVxidtMkA",
        authDomain: "igustira-store.firebaseapp.com",
        projectId: "igustira-store",
        storageBucket: "igustira-store.firebasestorage.app",
        messagingSenderId: "100273952262",
        appId: "1:100273952262:web:72d319bd66172e11149587"
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.saveToFirestore = async (data) => {
        await addDoc(collection(db, "pelanggan"), { ...data, tgl: new Date() });
    };
</script>

<script>
    let gameAktif = "";
    function openOrder(g) { gameAktif = g; document.getElementById('modalOrder').style.display = "block"; }
    function closeOrder() { document.getElementById('modalOrder').style.display = "none"; }

    function prosesKirimPanel() {
        // Panggil fungsi Firebase
        saveToFirestore({
            nama: document.getElementById('inpNamaUser').value,
            email: document.getElementById('inpEmailUser').value,
            game: gameAktif
        });
        
        alert("Pesanan terkirim!");
        closeOrder();
        // Lanjutkan fetch ke API Anda...
    }
</script>
</body>
</html>
