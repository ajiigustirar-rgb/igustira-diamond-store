<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGUSTIRA STORE - OFFICIAL</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card-bg: #1c2437; --accent: #7d3cf0; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }

        .header-banner { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            padding: 40px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header-banner h1 { margin: 0; font-size: 28px; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }

        .container { padding: 30px 15px 60px; max-width: 1100px; margin: auto; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }

        /* Card Style - Ukuran lebih kompak biar muat banyak */
        .card { 
            background: var(--card-bg); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s; text-align: center;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img { width: 100%; height: 140px; object-fit: cover; }
        .card-title { padding: 12px; font-weight: 800; font-size: 14px; background: #242f48; height: 40px; display: flex; align-items: center; justify-content: center; }

        /* Modal Custom */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: var(--card-bg); margin: 10px auto; padding: 20px; width: 92%; max-width: 500px; border-radius: 25px; border: 1px solid var(--primary); position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 30px; color: #ff4d4d; cursor: pointer; }

        /* Grid Nominal */
        .nominal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .nominal-item { 
            background: #242f48; padding: 12px; border-radius: 12px; border: 1px solid #323f58; 
            text-align: left; cursor: pointer; transition: 0.2s;
        }
        .nominal-item:hover, .nominal-item.active { border-color: var(--primary); background: rgba(0,255,136,0.1); }
        .nominal-item b { display: block; font-size: 13px; color: white; }
        .nominal-item span { font-size: 11px; color: var(--primary); }

        .rek-box { background: white; color: black; padding: 12px; border-radius: 15px; margin: 15px 0; }
        .rek-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 12px; }
        .copy-badge { font-size: 8px; background: var(--primary); padding: 3px 6px; border-radius: 4px; font-weight: 900; color: black; }

        label { display: block; margin: 15px 0 5px; font-size: 12px; color: #a0aec0; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #323f58; background: #0b0f1a; color: white; box-sizing: border-box; }
        
        .price-box { background: var(--accent); padding: 15px; border-radius: 15px; text-align: center; margin: 15px 0; }
        .price-box b { font-size: 22px; color: white; }

        .btn-wa { width: 100%; padding: 18px; background: var(--primary); color: #000; font-weight: 900; border: none; border-radius: 15px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header-banner">
    <h1>IGUSTIRA STORE</h1>
    <p>Pusat Jual Beli Terpercaya se-Asia Tenggara</p>
</div>

<div class="container">
    <div class="card-grid">
        <div class="card" onclick="openOrder('Mobile Legends', 'game')">
            <img src="ml.jpg"><div class="card-title">MOBILE LEGENDS</div>
        </div>
        <div class="card" onclick="openOrder('Free Fire', 'game')">
            <img src="ff.jpg"><div class="card-title">FREE FIRE</div>
        </div>
        <div class="card" onclick="openOrder('PUBG Mobile', 'game')">
            <img src="pubg.jpg"><div class="card-title">PUBG MOBILE</div>
        </div>
        <div class="card" onclick="openOrder('Genshin Impact', 'game')">
            <img src="genshin.jpg"><div class="card-title">GENSHIN IMPACT</div>
        </div>
        <div class="card" onclick="openOrder('Honor of Kings', 'game')">
            <img src="hok.jpg"><div class="card-title">HONOR OF KINGS</div>
        </div>
        <div class="card" onclick="openOrder('Valorant', 'game')">
            <img src="valorant.jpg"><div class="card-title">VALORANT</div>
        </div>
        <div class="card" onclick="openOrder('CV USDT (IDR)', 'usdt')">
            <img src="usdt.jpg"><div class="card-title">CV USDT (IDR)</div>
        </div>
    </div>
</div>

<div id="modalOrder" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeOrder()">&times;</span>
        <h2 id="modalTitle" style="color: var(--primary); margin: 0; font-size: 20px;">Top Up</h2>

        <div id="sectionRekGame" style="display:none;">
            <div class="rek-box">
                <div class="rek-item" onclick="copyText('1910432735')"><span><b>BNI:</b> 1910432735</span> <span class="copy-badge">SALIN</span></div>
                <div class="rek-item" onclick="salin('1140029832741')"><span><b>MANDIRI:</b> 1140029832741</span> <span class="copy-badge">SALIN</span></div>
                <div class="rek-item" onclick="copyText('082185160103')"><span><b>DANA/GOPAY:</b> 082185160103</span> <span class="copy-badge">SALIN</span></div>
            </div>
        </div>

        <label id="labelTarget">Data Tujuan:</label>
        <div style="display:flex; gap:5px;">
            <input type="text" id="targetId" placeholder="User ID / Player ID">
            <input type="text" id="targetServer" placeholder="(Server)" style="width:110px;">
        </div>

        <label id="labelNominal">Pilih Nominal:</label>
        <div id="nominalContainer" class="nominal-grid"></div>

        <div id="sectionBank" style="display:none;">
            <label>Pilih Bank Pencairan:</label>
            <select id="selectBank"><option value="BCA">BCA</option><option value="BNI">BNI</option><option value="DANA">DANA</option><option value="GOPAY">GOPAY</option></select>
            <label>Jumlah USDT:</label>
            <input type="number" id="inputUsdt" placeholder="0.00" oninput="calculateUsdt()">
        </div>

        <div class="price-box">
            <small>Total Bayar:</small><br>
            <b id="displayPrice">Rp 0</b>
        </div>
        
        <label>Upload Bukti Transfer:</label>
        <input type="file">

        <button class="btn-wa" onclick="sendWhatsApp()" style="margin-top:15px;">BELI SEKARANG</button>
    </div>
</div>

<script>
    let selectedPrice = 0;
    let selectedItem = "";
    let currentProd = "";

    const priceList = {
        "Mobile Legends": [
            {name: "86 Diamonds", price: 21500}, {name: "172 Diamonds", price: 43000},
            {name: "257 Diamonds", price: 64500}, {name: "Weekly Pass", price: 28500}
        ],
        "Free Fire": [
            {name: "70 Diamonds", price: 9500}, {name: "140 Diamonds", price: 19000},
            {name: "355 Diamonds", price: 47000}, {name: "720 Diamonds", price: 93500}
        ],
        "PUBG Mobile": [
            {name: "60 UC", price: 13500}, {name: "325 UC", price: 65000},
            {name: "660 UC", price: 130000}, {name: "1800 UC", price: 325000}
        ],
        "Genshin Impact": [
            {name: "60 Crystals", price: 14500}, {name: "300 Crystals", price: 72000},
            {name: "Blessing Moon", price: 73000}, {name: "980 Crystals", price: 215000}
        ],
        "Honor of Kings": [
            {name: "80 Tokens", price: 15500}, {name: "240 Tokens", price: 46500},
            {name: "Weekly Card", price: 31000}, {name: "1200 Tokens", price: 232000}
        ],
        "Valorant": [
            {name: "625 Points", price: 68000}, {name: "1125 Points", price: 120000},
            {name: "2250 Points", price: 235000}, {name: "4000 Points", price: 410000}
        ]
    };

    function openOrder(nama, tipe) {
        currentProd = nama;
        document.getElementById('modalTitle').innerText = "Top Up " + nama;
        document.getElementById('modalOrder').style.display = "block";
        const container = document.getElementById('nominalContainer');
        container.innerHTML = "";
        selectedPrice = 0;
        document.getElementById('displayPrice').innerText = "Rp 0";

        if(tipe === 'game') {
            document.getElementById('sectionRekGame').style.display = "block";
            document.getElementById('sectionRekUsdt').style.display = "none";
            document.getElementById('sectionBank').style.display = "none";
            document.getElementById('targetServer').style.display = (nama === 'PUBG Mobile' || nama === 'Valorant') ? "none" : "block";
            document.getElementById('labelNominal').style.display = "block";
            
            priceList[nama].forEach(item => {
                let div = document.createElement('div');
                div.className = "nominal-item";
                div.innerHTML = `<b>${item.name}</b><span>Rp ${item.price.toLocaleString()}</span>`;
                div.onclick = () => {
                    document.querySelectorAll('.nominal-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    selectedPrice = item.price;
                    selectedItem = item.name;
                    document.getElementById('displayPrice').innerText = "Rp " + item.price.toLocaleString();
                };
                container.appendChild(div);
            });
        } else {
            document.getElementById('sectionRekGame').style.display = "none";
            document.getElementById('sectionRekUsdt').style.display = "block";
            document.getElementById('sectionBank').style.display = "block";
            document.getElementById('targetServer').style.display = "none";
            document.getElementById('labelNominal').style.display = "none";
            document.getElementById('labelTarget').innerText = "No. Rekening Tujuan:";
        }
    }

    function calculateUsdt() {
        let jml = document.getElementById('inputUsdt').value;
        selectedPrice = jml * 16200;
        document.getElementById('displayPrice').innerText = "Rp " + selectedPrice.toLocaleString();
    }

    function closeOrder() { document.getElementById('modalOrder').style.display = "none"; }
    function copyText(t) { navigator.clipboard.writeText(t); alert("Salin: " + t); }

    function sendWhatsApp() {
        let id = document.getElementById('targetId').value;
        let srv = document.getElementById('targetServer').value;
        let bank = document.getElementById('selectBank').value;
        let price = document.getElementById('displayPrice').innerText;
        if(!id || selectedPrice === 0) return alert("Lengkapi data!");

        let msg = `Halo Bos Rangga,\n\nOrder: ${currentProd}\nItem: ${selectedItem}\nID: ${id} ${srv ? '('+srv+')' : ''}\nTotal: ${price}`;
        if(currentProd.includes('USDT')) {
            msg = `Halo Bos Rangga,\nCV USDT\nJumlah: ${document.getElementById('inputUsdt').value} USDT\nBank: ${bank}\nRekening: ${id}\nEstimasi: ${price}`;
        }
        window.location.href = `https://wa.me/6282185160103?text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
