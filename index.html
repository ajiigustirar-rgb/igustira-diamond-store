<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGUSTIRA STORE - OFFICIAL</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #1c2437; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        /* Banner Atas Sesuai Gambar */
        .banner-header { 
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); 
            padding: 30px 10px; 
            text-align: center; 
            margin-bottom: 25px;
        }
        .banner-header h1 { margin: 0; font-size: 28px; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }
        .banner-header p { margin: 5px 0 0; font-size: 13px; font-weight: bold; }

        /* Container Menu */
        .container { padding: 0 15px 50px; max-width: 1000px; margin: auto; }
        
        /* GRID GAME - Z-index Tinggi & Pointer Events Aktif */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            position: relative; 
            z-index: 10; 
        }
        
        .game-card { 
            background: var(--card); 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid #323f58; 
            cursor: pointer; 
            transition: 0.2s;
            pointer-events: auto; /* Pastikan bisa diklik */
        }
        .game-card:active { transform: scale(0.95); border-color: var(--primary); }
        
        .img-box { width: 100%; height: 150px; overflow: hidden; }
        .game-card img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
        
        .card-title { padding: 12px; text-align: center; font-weight: bold; font-size: 14px; background: #242f48; }

        /* MODAL SYSTEM - Teknik Tembus Pandang (Pointer Events None) */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 99999; 
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); 
            align-items: center; 
            justify-content: center;
            pointer-events: none; /* Tembus saat tertutup */
        }
        .modal.active { display: flex; pointer-events: auto; } /* Aktif saat terbuka */

        .modal-content { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 20px; 
            width: 85%; 
            max-width: 400px; 
            border: 1px solid var(--primary); 
            position: relative;
        }

        /* Fitur Salin Rekening */
        .rek-box { background: white; color: black; padding: 12px; border-radius: 10px; margin: 15px 0; }
        .rek-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; cursor: pointer; font-size: 13px; }
        .copy-tag { font-size: 9px; background: var(--primary); padding: 2px 5px; border-radius: 4px; font-weight: bold; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #323f58; background: #0b0f1a; color: white; box-sizing: border-box; }
        
        .price-info { background: rgba(0,255,136,0.1); padding: 12px; border-radius: 10px; text-align: center; margin: 10px 0; border: 1px dashed var(--primary); }
        .price-info b { font-size: 20px; color: var(--primary); }

        .btn-wa { width: 100%; padding: 15px; background: var(--primary); color: #000; font-weight: 800; border: none; border-radius: 10px; cursor: pointer; margin-top: 10px; }
        .btn-close { position: absolute; right: 15px; top: 10px; color: #ff4d4d; background: none; border: none; font-size: 30px; cursor: pointer; }
    </style>
</head>
<body>

<div class="banner-header">
    <h1>IGUSTIRA STORE</h1>
    <p>Pusat Jual Beli Terpercaya se-Asia Tenggara</p>
</div>

<div class="container">
    <div class="game-grid">
        <div class="game-card" onclick="openModal('Mobile Legends', 300)">
            <div class="img-box">
                <img src="ml.jpg"> 
            </div>
            <div class="card-title">MOBILE LEGENDS</div>
        </div>

        <div class="game-card" onclick="openModal('Free Fire', 150)">
            <div class="img-box">
                <img src="ff.jpg">
            </div>
            <div class="card-title">FREE FIRE</div>
        </div>

        <div class="game-card" onclick="openModal('CV USDT (IDR)', 16200)">
            <div class="img-box">
                <img src="usdt.jpg">
            </div>
            <div class="card-title">CV USDT</div>
        </div>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <button class="btn-close" onclick="closeModal()">&times;</button>
        <h3 id="modalTitle" style="color: var(--primary); margin: 0;">Order</h3>

        <div id="rekArea">
            <p style="font-size: 10px; color: #a0aec0; margin: 10px 0 5px;">Klik untuk salin nomor:</p>
            <div class="rek-box">
                <div class="rek-item" onclick="copy('1910432735')"><span>BNI: 1910432735</span> <span class="copy-tag">SALIN</span></div>
                <div class="rek-item" onclick="copy('1140029832741')"><span>MANDIRI: 1140029832741</span> <span class="copy-tag">SALIN</span></div>
                <div class="rek-item" onclick="copy('082185160103')"><span>DANA/GOPAY: 082185160103</span> <span class="copy-tag">SALIN</span></div>
            </div>
        </div>

        <div id="usdtArea" style="display:none; text-align:center;">
            <div style="background:white; color:black; padding:10px; border-radius:10px; font-size:11px; cursor:pointer;" onclick="copy('TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH')">
                TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH<br><b>(KLIK UNTUK SALIN TRC20)</b>
            </div>
        </div>

        <label style="font-size: 12px; margin-top: 10px; display: block;">Jumlah:</label>
        <input type="number" id="jml" placeholder="Masukkan angka..." oninput="hitung()">

        <div class="price-info">
            <small>Total Bayar:</small><br>
            <b id="totalHarga">Rp 0</b>
        </div>

        <input type="text" id="tujuan" placeholder="User ID (Server) atau Rekening">
        
        <label style="font-size: 12px;">Bukti Bayar:</label>
        <input type="file" id="bukti">

        <button class="btn-wa" onclick="kirim()">KONFIRMASI WHATSAPP</button>
    </div>
</div>

<script>
    let currentRate = 0;
    let currentSvc = "";

    function openModal(nama, rate) {
        currentSvc = nama;
        currentRate = rate;
        document.getElementById('modalTitle').innerText = nama;
        document.getElementById('jml').value = "";
        document.getElementById('totalHarga').innerText = "Rp 0";
        
        if(nama.includes('USDT')) {
            document.getElementById('rekArea').style.display = "none";
            document.getElementById('usdtArea').style.display = "block";
        } else {
            document.getElementById('rekArea').style.display = "block";
            document.getElementById('usdtArea').style.display = "none";
        }
        
        document.getElementById('orderModal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('orderModal').classList.remove('active');
    }

    function hitung() {
        let val = document.getElementById('jml').value;
        document.getElementById('totalHarga').innerText = "Rp " + (val * currentRate).toLocaleString('id-ID');
    }

    function copy(txt) {
        navigator.clipboard.writeText(txt);
        alert("Berhasil disalin!");
    }

    function kirim() {
        let j = document.getElementById('jml').value;
        let t = document.getElementById('tujuan').value;
        let p = document.getElementById('totalHarga').innerText;
        if(!j || !t || !document.getElementById('bukti').value) return alert("Lengkapi data!");

        let link = `https://wa.me/6282185160103?text=Halo Bos Rangga, mau order ${currentSvc}.\nJumlah: ${j}\nTotal: ${p}\nTarget: ${t}`;
        window.location.href = link;
    }

    window.onclick = function(e) { if(e.target.id == 'orderModal') closeModal(); }
</script>
</body>
</html>
