<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGUSTIRA STORE</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161d2f; }
        body { font-family: sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: var(--primary); margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* GRID UTAMA - Dipaksa paling depan */
        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            position: relative; 
            z-index: 999 !important; /* Paling depan */
        }

        .game-card { 
            background: var(--card); 
            border-radius: 12px; 
            border: 2px solid #2d3748; 
            overflow: hidden; 
            cursor: pointer; 
            display: block;
            text-decoration: none;
            color: white;
            -webkit-tap-highlight-color: rgba(0,255,136,0.5); /* Efek klik di HP */
        }

        .game-card img { width: 100%; height: 140px; object-fit: cover; pointer-events: none; }
        .game-card .title { padding: 10px; text-align: center; font-weight: bold; font-size: 14px; }

        /* MODAL - Posisi Fixed */
        .modal { 
            display: none; 
            position: fixed; 
            z-index: 1000000; /* Jutaan agar di atas segalanya */
            left: 0; top: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); 
            overflow-y: auto; 
            padding-top: 50px;
        }

        .modal-content { 
            background: var(--card); 
            margin: auto; 
            padding: 20px; 
            border: 1px solid var(--primary); 
            width: 85%; 
            max-width: 400px; 
            border-radius: 15px; 
        }

        .copy-box { background: white; color: black; padding: 10px; border-radius: 8px; margin: 15px 0; font-size: 13px; }
        .copy-item { padding: 8px 0; border-bottom: 1px solid #ddd; cursor: pointer; display: flex; justify-content: space-between; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #0b0f1a; color: white; box-sizing: border-box; }
        .btn-wa { width: 100%; padding: 15px; background: var(--primary); color: black; font-weight: bold; border: none; border-radius: 8px; margin-top: 15px; cursor: pointer; }
        .btn-close { float: right; color: red; font-size: 25px; border: none; background: none; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h1>IGUSTIRA STORE</h1>
    <p style="font-size: 11px;">A/N RANGGA AJI IGUSTIRA</p>
</div>

<div class="game-grid">
    <div class="game-card" onclick="openModal('Mobile Legends', 300)">
        <img src="https://gcdn.pbrd.co/images/H9uA7uM9v8Lz.jpg?o=1"> <div class="title">MOBILE LEGENDS</div>
    </div>

    <div class="game-card" onclick="openModal('Free Fire', 150)">
        <img src="https://gcdn.pbrd.co/images/8rO0N4K6bF9k.jpg?o=1"> <div class="title">FREE FIRE</div>
    </div>

    <div class="game-card" onclick="openModal('CV USDT', 16200)">
        <img src="https://gcdn.pbrd.co/images/vWvT6H5e4i2n.jpg?o=1">
        <div class="title">EXCHANGE USDT</div>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <button class="btn-close" onclick="closeModal()">&times;</button>
        <h3 id="modalTitle" style="color: var(--primary);">ORDER</h3>

        <div id="rekeningSection">
            <p style="font-size: 10px; color: #a0aec0;">Tap nomor untuk copy:</p>
            <div class="copy-box">
                <div class="copy-item" onclick="salin('1910432735')"><b>BNI:</b> 1910432735 📋</div>
                <div class="copy-item" onclick="salin('1140029832741')"><b>MANDIRI:</b> 1140029832741 📋</div>
                <div class="copy-item" onclick="salin('082185160103')"><b>DANA:</b> 082185160103 📋</div>
            </div>
        </div>

        <div id="usdtSection" style="display:none; text-align:center;">
            <p style="color:white; font-size:11px;">Alamat USDT TRC20:</p>
            <div style="background:white; padding:10px; border-radius:10px; cursor:pointer;" onclick="salin('TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH')">
                <code style="color:black; font-size:10px;">TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH</code><br>
                <small style="color:blue;">(Klik untuk Copy)</small>
            </div>
        </div>

        <label style="font-size: 12px;">Jumlah:</label>
        <input type="number" id="jumlah" placeholder="Masukkan angka..." oninput="hitung()">
        
        <div style="text-align:center; padding:10px; border:1px dashed var(--primary); margin:10px 0;">
            <small>Total Bayar:</small><br>
            <span id="totalText" style="font-size:20px; font-weight:bold; color:var(--primary);">Rp 0</span>
        </div>

        <input type="text" id="target" placeholder="User ID / Rekening Tujuan">
        
        <label style="font-size: 12px;">Upload Bukti:</label>
        <input type="file" id="bukti">

        <button class="btn-wa" onclick="kirim()">KIRIM KE WHATSAPP</button>
    </div>
</div>

<script>
    let rate = 0;
    let service = "";

    function openModal(name, val) {
        service = name;
        rate = val;
        document.getElementById('modalTitle').innerText = name;
        document.getElementById('orderModal').style.display = "block";
        
        if(name === 'CV USDT') {
            document.getElementById('rekeningSection').style.display = "none";
            document.getElementById('usdtSection').style.display = "block";
        } else {
            document.getElementById('rekeningSection').style.display = "block";
            document.getElementById('usdtSection').style.display = "none";
        }
    }

    function closeModal() {
        document.getElementById('orderModal').style.display = "none";
    }

    function hitung() {
        let jml = document.getElementById('jumlah').value;
        document.getElementById('totalText').innerText = "Rp " + (jml * rate).toLocaleString('id-ID');
    }

    function salin(teks) {
        navigator.clipboard.writeText(teks);
        alert("Berhasil disalin: " + teks);
    }

    function kirim() {
        let jml = document.getElementById('jumlah').value;
        let tgt = document.getElementById('target').value;
        let tot = document.getElementById('totalText').innerText;
        if(!jml || !tgt) return alert("Lengkapi data!");

        let url = `https://wa.me/6282185160103?text=Halo Bos Rangga, saya mau order ${service}.\nJumlah: ${jml}\nTotal: ${tot}\nTarget: ${tgt}`;
        window.location.href = url;
    }

    // Klik luar modal tutup
    window.onclick = function(event) {
        if (event.target == document.getElementById('orderModal')) {
            closeModal();
        }
    }
</script>

</body>
</html>
