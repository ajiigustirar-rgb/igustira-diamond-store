<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGUSTIRA STORE - OFFICIAL</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card-bg: rgba(28, 36, 55, 0.85); --accent: #7d3cf0; --sidebar: rgba(19, 26, 43, 0.9); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; min-height: 100vh; position: relative; overflow-x: hidden; }
        #gaming-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .sidebar { width: 240px; background: var(--sidebar); height: 100vh; position: fixed; border-right: 1px solid rgba(255,255,255,0.05); padding: 20px; box-sizing: border-box; display: none; z-index: 10; backdrop-filter: blur(10px); }
        .sidebar-logo { font-size: 20px; font-weight: 900; color: var(--primary); margin-bottom: 30px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; text-transform: uppercase; }
        .nav-link { display: block; color: #a0aec0; text-decoration: none; padding: 12px 15px; border-radius: 10px; margin-bottom: 5px; font-weight: 600; transition: 0.3s; }
        .nav-link:hover { background: rgba(0,255,136,0.1); color: var(--primary); }
        .main-content { flex: 1; margin-left: 0; transition: 0.3s; position: relative; z-index: 1; }
        .hero-section { background: linear-gradient(rgba(11, 15, 26, 0.4), rgba(11, 15, 26, 0.8)), url('https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&q=80&w=2070'); background-size: cover; background-position: center; padding: 60px 20px; text-align: center; border-bottom: 3px solid var(--primary); }
        .hero-section h1 { font-size: 36px; margin: 0; font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 20px var(--primary); text-transform: uppercase; }
        .hero-section p { font-size: 13px; color: var(--primary); font-weight: bold; margin-top: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .container { padding: 40px 20px; max-width: 1200px; margin: auto; box-sizing: border-box; }
        .section-title { font-size: 20px; font-weight: 800; margin-bottom: 25px; display: flex; align-items: center; gap: 10px; text-transform: uppercase; }
        .section-title::before { content: ""; width: 5px; height: 25px; background: var(--primary); border-radius: 5px; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 20px; }
        .card { background: var(--card-bg); border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.4s; position: relative; backdrop-filter: blur(5px); }
        .card:hover { transform: scale(1.05); border-color: var(--primary); box-shadow: 0 10px 30px rgba(0,255,136,0.3); }
        .card img { width: 100%; height: 140px; object-fit: cover; filter: brightness(0.7); transition: 0.3s; }
        .card:hover img { filter: brightness(1); }
        .card-title { padding: 15px; font-weight: 800; font-size: 13px; text-align: center; background: rgba(36, 47, 72, 0.9); letter-spacing: 0.5px; }
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); overflow-y: scroll; padding: 10px 0; backdrop-filter: blur(5px); }
        .modal-content { background: #1c2437; margin: 10px auto 50px auto; padding: 25px; width: 92%; max-width: 460px; border-radius: 25px; border: 1px solid var(--primary); position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 32px; color: #ff4d4d; cursor: pointer; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #323f58; background: #0b0f1a; color: white; margin-bottom: 10px; }
        .btn-panel { width: 100%; padding: 18px; background: var(--primary); color: #000; font-weight: 900; border: none; border-radius: 18px; cursor: pointer; }
    </style>
</head>
