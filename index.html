<script>
    // --- CANVAS BACKGROUND SYSTEM ---
    const canvas = document.getElementById('gaming-bg');
    const ctx = canvas.getContext('2d');
    let particles = [];

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 1;
            this.speedX = Math.random() * 0.6 - 0.3;
            this.speedY = Math.random() * -0.8 - 0.2;
            this.alpha = Math.random() * 0.5 + 0.2;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.y < 0) {
                this.y = canvas.height;
                this.x = Math.random() * canvas.width;
            }
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00ff88';
            ctx.fillStyle = '#00ff88';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function initParticles() {
        particles = [];
        const count = Math.min(60, Math.floor(canvas.width / 20));
        for (let i = 0; i < count; i++) { particles.push(new Particle()); }
    }
    initParticles();

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // --- GAME ENGINE DATABASE & LOGIC SYSTEM ---
    let hargaPilihan = 0, itemPilihan = "", gameAktif = "", rateCustom = 0, nominalKetik = 0;
    
    const db = {
        "Mobile Legends": { rate: 335, items: [{n: "77 Diamonds", p: 25800}, {n: "154 Diamonds", p: 51600}, {n: "256 Diamonds", p: 89500}] },
        "Free Fire": { rate: 148, items: [{n: "70 Diamonds", p: 10500}, {n: "140 Diamonds", p: 21000}, {n: "355 Diamonds", p: 52500}] },
        "PUBG Mobile": { rate: 255, items: [{n: "60 UC", p: 15500}, {n: "325 UC", p: 73000}] },
        "Honor of Kings": { rate: 215, items: [{n: "80 Tokens", p: 17500}, {n: "240 Tokens", p: 52000}] },

        "Metal Slug: Awakening": { rate: 165, items: [{n: "60 Ruby", p: 15500}, {n: "310 Ruby", p: 76000}] },
        "Clash of Clans": { rate: 175, items: [{n: "88 Gems", p: 16500}, {n: "500 Gems", p: 82500}] },
        "Black Clover M": { rate: 240, items: [{n: "200 Black Crystals", p: 71500}, {n: "500 Black Crystals", p: 164000}] },
        "NIKKE": { rate: 285, items: [{n: "320 Gems", p: 87000}, {n: "720 Gems", p: 175000}] },
        "Blue Archive": { rate: 230, items: [{n: "420 Pyroxene", p: 109000}, {n: "840 Pyroxene", p: 208000}] },

    // Fungsi Pengatur Nominal Otomatis (Metode API pihak ke-3 yang jauh lebih ringan & aman dari Blank Screen)
    function updateQrisOtomatis() {
        const qrisImg = document.querySelector('.qris-img');
        if (!qrisImg) return;
        
        if (hargaPilihan > 0) {
            // Kita gunakan QRIS Generator e-wallet via teks payload interaktif tanpa memuat string raksasa
            // Ini akan langsung memunculkan interface pembayaran nominal presisi di e-wallet
            qrisImg.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=qris://payment?amount=${hargaPilihan}`;
        } else {
            qrisImg.src = "qris.jpg";
        }
    }

    function openOrder(game) {
        gameAktif = game;
        document.getElementById('modalOrder').style.display = "block";
        document.getElementById('txtTotal').innerText = "Rp 0";
        document.getElementById('inpCustom').value = "";
        document.getElementById('inpId').value = "";
        document.getElementById('inpSrv').value = "";
        document.getElementById('inpNoRek').value = "";
        document.getElementById('inpNamaRek').value = "";
        document.getElementById('inpUsdt').value = "";
        hargaPilihan = 0;
        nominalKetik = 0;

        if(game === 'CV USDT') {
            document.getElementById('modalTitle').innerText = "CV USDT (IDR)";
            document.getElementById('priceLabel').innerText = "Estimasi IDR Diterima:";
            document.getElementById('nominalArea').style.display = "none";
            document.getElementById('gameDataArea').style.display = "none";
            document.getElementById('usdtArea').style.display = "block";
            
            document.getElementById('rekArea').innerHTML = `
                <div class="rek-box" onclick="copy('TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH')" style="text-align:center; background:#f0fff4; border:1px solid var(--primary); cursor:pointer;">
                    <p style="margin:0 0 5px; font-size:10px; font-weight:bold; color:#2f855a;">Kirim USDT TRC20 Ke Alamat:</p>
                    <b style="font-size:12px; word-break:break-all; color:#222;">TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH</b><br>
                    <span class="copy-badge" style="margin-top:8px; display:inline-block;">KLIK UNTUK SALIN ALAMAT</span>
                </div>`;
        } else {

            document.getElementById('priceLabel').innerText = "Total Harga:";
            document.getElementById('nominalArea').style.display = "block";
            document.getElementById('gameDataArea').style.display = "block";
            document.getElementById('usdtArea').style.display = "none";
            
            const sHide = ['PUBG Mobile', 'Valorant', 'Call of Duty Mobile', 'Roblox', 'Efootball', 'Clash of Clans', 'Point Blank', 'Growtopia'];
            document.getElementById('srvBox').style.display = sHide.includes(game) ? "none" : "block";
            rateCustom = db[game].rate;
            
            document.getElementById('rekArea').innerHTML = `
                <div class="rek-box">
                    <div class="rek-item" onclick="copy('1910432735')"><span><b>BNI:</b> 1910432735</span> <span class="copy-badge">SALIN</span></div>
                    <div class="rek-item" onclick="copy('1140029832741')"><span><b>MANDIRI:</b> 1140029832741</span> <span class="copy-badge">SALIN</span></div>
                    <div class="rek-item" onclick="copy('082185160103')"><span><b>DANA/GOPAY:</b> 082185160103</span> <span class="copy-badge">SALIN</span></div>
                    <p style="text-align:center;font-size:11px;margin:8px 0 0;font-weight:bold;color:#1a202c;">A/N RANGGA AJI IGUSTIRA</p>
                </div>
                <div class="qris-container">
                    <span style="font-size:11px; font-weight:900; color:#1a202c; letter-spacing:0.5px;">⚡ BAYAR OTOMATIS VIA QRIS ALL PAYMENT</span>
                    <img src="qris.jpg" class="qris-img" alt="QRIS Toko">
                </div>`;
            
            const list = document.getElementById('nominalList');
            list.innerHTML = "";
            db[game].items.forEach(i => {
                let d = document.createElement('div');
                d.className = "nominal-item";
                d.innerHTML = `<b style="font-size:12px;">${i.n}</b><br><span style="font-size:11px; color:var(--primary); font-weight:bold;">Rp ${i.p.toLocaleString('id-ID')}</span>`;
                d.onclick = () => {
                    document.querySelectorAll('.nominal-item').forEach(e => e.classList.remove('active'));
                    d.classList.add('active');
                    document.getElementById('inpCustom').value = "";
                    hargaPilihan = i.p; itemPilihan = i.n; nominalKetik = 0;
                    document.getElementById('txtTotal').innerText = "Rp " + i.p.toLocaleString('id-ID');
                    updateQrisOtomatis(); 
                };
                list.appendChild(d);
            });
        }
    }

    function calcCustom() {
        document.querySelectorAll('.nominal-item').forEach(e => e.classList.remove('active'));
        let jml = document.getElementById('inpCustom').value;
        if(jml > 0) {
            nominalKetik = parseInt(jml);
            hargaPilihan = Math.round(jml * rateCustom);
            itemPilihan = jml + " Pcs (Custom)";
            document.getElementById('txtTotal').innerText = "Rp " + hargaPilihan.toLocaleString('id-ID');
        } else {
            document.getElementById('txtTotal').innerText = "Rp 0";
            hargaPilihan = 0;
            nominalKetik = 0;
        }
        updateQrisOtomatis(); 
    }

    function calcUsdt() {
        let v = document.getElementById('inpUsdt').value;
        if(v > 0) {
            hargaPilihan = v * 16200;
            document.getElementById('txtTotal').innerText = "Rp " + hargaPilihan.toLocaleString('id-ID');
        } else {
            document.getElementById('txtTotal').innerText = "Rp 0";
            hargaPilihan = 0;
        }
    }

    function closeOrder() { document.getElementById('modalOrder').style.display = "none"; }
    function copy(t) { navigator.clipboard.writeText(t); alert("Berhasil Disalin: " + t); }

    function gasWA() {
        if(gameAktif === 'CV USDT') {
            let jml = document.getElementById('inpUsdt').value;
            let bank = document.getElementById('selBank').value;
            let norek = document.getElementById('inpNoRek').value;
            let namarek = document.getElementById('inpNamaRek').value;
            if(!jml || !norek || !namarek || hargaPilihan === 0) return alert("Mohon lengkapi seluruh data transaksi USDT Anda!");
            
            let m = `Halo Bos Rangga,\n\nOrder: CV USDT\nJumlah: ${jml} USDT\nBank Pencairan: ${bank}\nNo. Rekening: ${norek}\nNama Pemilik: ${namarek}\nEstimasi IDR Diterima: ${document.getElementById('txtTotal').innerText}`;
            window.location.href = `https://wa.me/6282185160103?text=${encodeURIComponent(m)}`;
        } else {
            if(nominalKetik > 0 && nominalKetik < 50) {
                return alert("Transaksi Ditolak! Minimal pembelian ketik sendiri adalah 50.");
            }

            let id = document.getElementById('inpId').value;
            let srv = document.getElementById('inpSrv').value;
            if(!id || hargaPilihan === 0) return alert("Mohon isi ID Akun dan tentukan nominal paket!");
            
            let srvText = (document.getElementById('srvBox').style.display !== "none" && srv) ? ` (${srv})` : "";
            let m = `Halo Bos Rangga,\n\nOrder: ${gameAktif}\nItem: ${itemPilihan}\nID Tujuan: ${id}${srvText}\nTotal Bayar: ${document.getElementById('txtTotal').innerText}`;
            window.location.href = `https://wa.me/6282185160103?text=${encodeURIComponent(m)}`;
        }
    }

    window.onclick = function(e) { 
        let modal = document.getElementById('modalOrder');
        if (e.target == modal) closeOrder(); 
    }
</script>
