<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGUSTIRA STORE - Pusat Jual Beli Terpercaya</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background: #020617; color: white; font-family: 'Orbitron', sans-serif; }
        .price-card { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: 20px; padding: 20px; text-align: center; }
        .update-flash { animation: flash 1s ease-out; }
        @keyframes flash { 0% { background: rgba(16, 185, 129, 0.4); } 100% { background: transparent; } }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto text-center">
        <h1 class="text-4xl font-black italic text-blue-500 mb-2">IGUSTIRA STORE</h1>
        <p class="text-xs text-gray-400 uppercase tracking-widest mb-10">Live Crypto Price Monitoring</p>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-10">
            <!-- BNB Card -->
            <div id="bnb-container" class="price-card">
                <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" class="w-12 mx-auto mb-4" alt="BNB">
                <h2 class="text-xl font-bold">BINANCE COIN (BNB)</h2>
                <p id="bnb-price" class="text-3xl font-black text-yellow-400 mt-2">Memuat...</p>
                <p class="text-[10px] text-gray-500 mt-2 italic">Update otomatis setiap 60 detik</p>
            </div>

            <!-- XRP Card -->
            <div id="xrp-container" class="price-card">
                <img src="https://cryptologos.cc/logos/xrp-xrp-logo.png" class="w-12 mx-auto mb-4" alt="XRP">
                <h2 class="text-xl font-bold">RIPPLE (XRP)</h2>
                <p id="xrp-price" class="text-3xl font-black text-blue-400 mt-2">Memuat...</p>
                <p class="text-[10px] text-gray-500 mt-2 italic">Update otomatis setiap 60 detik</p>
            </div>
        </div>
        
        <p class="text-sm text-gray-400 italic">Dikelola oleh: Rangga Aji Igustira</p>
    </div>

    <script>
        async function fetchPrices() {
            try {
                // Mengambil data dari Binance API (Gratis & Cepat)
                const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BNBUSDT","XRPUSDT"]');
                const data = await response.json();
                
                const bnbPrice = parseFloat(data.find(item => item.symbol === "BNBUSDT").price).toFixed(2);
                const xrpPrice = parseFloat(data.find(item => item.symbol === "XRPUSDT").price).toFixed(4);

                // Update tampilan dengan animasi flash
                document.getElementById('bnb-price').innerText = '$ ' + bnbPrice;
                document.getElementById('xrp-price').innerText = '$ ' + xrpPrice;
                
                document.getElementById('bnb-container').classList.add('update-flash');
                document.getElementById('xrp-container').classList.add('update-flash');
                
                setTimeout(() => {
                    document.getElementById('bnb-container').classList.remove('update-flash');
                    document.getElementById('xrp-container').classList.remove('update-flash');
                }, 1000);

            } catch (error) {
                console.error('Gagal mengambil harga:', error);
            }
        }

        // Jalankan saat web dibuka
        fetchPrices();
        // Update setiap 60 detik (bisa disesuaikan)
        setInterval(fetchPrices, 60000);
    </script>
</body>
</html>
