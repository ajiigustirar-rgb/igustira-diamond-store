<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IGUSTIRA STORE - OFFICIAL</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card-bg: #1c2437; --accent: #7d3cf0; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; }

        .header-banner { 
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); 
            padding: 40px 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .header-banner h1 { margin: 0; font-size: 28px; text-transform: uppercase; font-weight: 900; letter-spacing: 2px; }

        .container { padding: 30px 15px 60px; max-width: 1000px; margin: auto; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; }

        .card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer; transition: 0.3s; text-align: center;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        .card img { width: 100%; height: 190px; object-fit: cover; }
        .card-title { padding: 18px; font-weight: 800; font-size: 18px; background: #242f48; }

        /* Modal Custom */
        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: var(--card-bg); margin: 10px auto; padding: 20px; width: 92%; max-width: 500px; border-radius: 25px; border: 1px solid var(--primary); position: relative; }
        .close { position: absolute; right: 20px; top: 15px; font-size: 30px; color: #ff4d4d; cursor: pointer; }

        /* Grid Nominal */
        .nominal-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .nominal-item { 
            background: #242f48; padding: 12px; border-radius: 12px; border: 1px solid #323f58; 
            text-align: left; cursor: pointer; transition: 0.2s;
        }
        .nominal-item:hover, .nominal-item.active { border-color: var(--primary); background: rgba(0,255,136,0.1); }
        .nominal-item b { display: block; font-size: 14px; color: white; }
        .nominal-item span { font-size: 12px; color: var(--primary); }

        /* Rekening Style */
        .rek-box { background: white; color: black; padding: 12px; border-radius: 15px; margin: 15px 0; }
        .rek-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 13px; }
        .copy-badge { font-size: 9px; background: var(--primary); padding: 4px 8px; border-radius: 6px; font-weight: 900; color: black; }

        label { display: block; margin: 15px 0 5px; font-size: 13px; color: #a0aec0; font-weight: bold; }
        input, select { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #323f58; background: #0b0f1a; color: white; box-sizing: border-box; }
        
        .price-box { background: var(--accent); padding: 15px; border-radius: 15px; text-align: center; margin: 20px 0; }
        .price-box b { font-size: 24px; color: white; }

        .btn-wa { width: 100%; padding: 18px; background: var(--primary); color: #000; font-weight: 900; border: none; border-radius: 15px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="header-banner">
    <h1>IGUSTIRA STORE</h1>
    <p>Pusat Jual Beli Terpercaya se-Asia Tenggara</p>
</div>

<div class="container">
    <div class="card-grid">
        <div class="card" onclick="openOrder('Mobile Legends', 'game')">
            <img src="ml.jpg">
            <div class="card-title">MOBILE LEGENDS</div>
        </div>
        <div class="card" onclick="openOrder('Free Fire', 'game')">
            <img src="ff.jpg">
            <div class="card-title">FREE FIRE</div>
        </div>
        <div class="card" onclick="openOrder('CV USDT (IDR)', 'usdt')">
            <img src="usdt.jpg">
            <div class="card-title">CV USDT (IDR)</div>
        </div>
    </div>
</div>

<div id="modalOrder" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeOrder()">&times;</span>
        <h2 id="modalTitle" style="color: var(--primary); margin: 0;">Top Up</h2>

        <div id="sectionRekGame" style="display:none;">
            <div class="rek-box">
                <div class="rek-item" onclick="copyText('1910432735')"><span><b>BNI:</b> 1910432735</span> <span class="copy-badge">SALIN</span></div>
                <div class="rek-item" onclick="copyText('1140029832741')"><span><b>MANDIRI:</b> 1140029832741</span> <span class="copy-badge">SALIN</span></div>
                <div class="rek-item" onclick="copyText('082185160103')"><span><b>DANA/GOPAY:</b> 082185160103</span> <span class="copy-badge">SALIN</span></div>
            </div>
            <p style="text-align: center; color: var(--primary); font-size: 11px; margin-top: -10px;">A/N RANGGA AJI IGUSTIRA</p>
        </div>

        <div id="sectionRekUsdt" style="display:none;">
            <div class="rek-box" onclick="copyText('TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH')" style="cursor:pointer; text-align:center;">
                <b style="font-size: 11px; word-break: break-all;">TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH</b><br>
                <span class="copy-badge" style="display:inline-block; margin-top:8px;">SALIN ALAMAT TRC20</span>
            </div>
        </div>

        <label id="labelTarget">Data Tujuan:</label>
        <div style="display:flex; gap:5px;">
            <input type="text" id="targetId" placeholder="User ID">
            <input type="text" id="targetServer" placeholder="(Server)" style="width:100px;">
        </div>

        <label id="labelNominal">Pilih Nominal:</label>
        <div id="nominalContainer" class="nominal-grid"></div>

        <div id="sectionBank" style="display:none;">
            <label>Pilih Bank Pencairan:</label>
            <select id="selectBank">
                <option value="BCA">BCA</option><option value="BNI">BNI</option><option value="BRI">BRI</option>
                <option value="MANDIRI">MANDIRI</option><option value="DANA">DANA</option><option value="GOPAY">GOPAY</option>
            </select>
            <label>Jumlah USDT:</label>
            <input type="number" id="inputUsdt" placeholder="Masukkan angka..." oninput="calculateUsdt()">
        </div>

        <div class="price-box">
            <small>Total Bayar:</small><br>
            <b id="displayPrice">Rp 0</b>
        </div>
        
        <label>Bukti Transfer:</label>
        <input type="file">

        <button class="btn-wa" onclick="sendWhatsApp()" style="margin-top:15px;">BELI SEKARANG</button>
    </div>
</div>

<script>
    let selectedPrice = 0;
    let selectedItem = "";
    let currentProd = "";

    const listML = [
        {name: "5 Diamonds", price: 1564}, {name: "11 Diamonds", price: 3651},
        {name: "17 Diamonds", price: 5737}, {name: "25 Diamonds", price: 8344},
        {name: "40 Diamonds", price: 12516}, {name: "53 Diamonds", price: 16687},
        {name: "77 Diamonds", price: 23988}, {name: "Weekly Pass", price: 30246}
    ];

    const listFF = [
        {name: "50 Diamonds", price: 8000}, {name: "70 Diamonds", price: 10000},
        {name: "140 Diamonds", price: 20000}, {name: "355 Diamonds", price: 50000}
    ];

    function openOrder(nama, tipe) {
        currentProd = nama;
        document.getElementById('modalTitle').innerText = nama;
        document.getElementById('modalOrder').style.display = "block";
        const container = document.getElementById('nominalContainer');
        container.innerHTML = "";
        selectedPrice = 0;
        document.getElementById('displayPrice').innerText = "Rp 0";

        if(tipe === 'game') {
            document.getElementById('sectionRekGame').style.display = "block";
            document.getElementById('sectionRekUsdt').style.display = "none";
            document.getElementById('sectionBank').style.display = "none";
            document.getElementById('targetServer').style.display = "block";
            document.getElementById('labelNominal').style.display = "block";
            
            let list = (nama === 'Mobile Legends') ? listML : listFF;
            list.forEach(item => {
                let div = document.createElement('div');
                div.className = "nominal-item";
                div.innerHTML = `<b>${item.name}</b><span>Rp ${item.price.toLocaleString()}</span>`;
                div.onclick = () => {
                    document.querySelectorAll('.nominal-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    selectedPrice = item.price;
                    selectedItem = item.name;
                    document.getElementById('displayPrice').innerText = "Rp " + item.price.toLocaleString();
                };
                container.appendChild(div);
            });
        } else {
            document.getElementById('sectionRekGame').style.display = "none";
            document.getElementById('sectionRekUsdt').style.display = "block";
            document.getElementById('sectionBank').style.display = "block";
            document.getElementById('targetServer').style.display = "none";
            document.getElementById('labelNominal').style.display = "none";
            document.getElementById('labelTarget').innerText = "No. Rekening Tujuan:";
        }
    }

    function calculateUsdt() {
        let jml = document.getElementById('inputUsdt').value;
        selectedPrice = jml * 16200;
        document.getElementById('displayPrice').innerText = "Rp " + selectedPrice.toLocaleString();
    }

    function closeOrder() { document.getElementById('modalOrder').style.display = "none"; }

    function copyText(t) { navigator.clipboard.writeText(t); alert("Salin: " + t); }

    function sendWhatsApp() {
        let id = document.getElementById('targetId').value;
        let srv = document.getElementById('targetServer').value;
        let bank = document.getElementById('selectBank').value;
        let price = document.getElementById('displayPrice').innerText;
        
        if(!id || selectedPrice === 0) return alert("Lengkapi data dan pilih nominal!");

        let msg = `Halo Bos Rangga,\n\nOrder: ${currentProd}\nItem: ${selectedItem}\nID: ${id} (${srv})\nTotal: ${price}`;
        if(currentProd.includes('USDT')) {
            msg = `Halo Bos Rangga,\nCV USDT\nJumlah: ${document.getElementById('inputUsdt').value} USDT\nBank: ${bank}\nRekening: ${id}\nEstimasi: ${price}`;
        }
        window.location.href = `https://wa.me/6282185160103?text=${encodeURIComponent(msg)}`;
    }
</script>
</body>
</html>
