<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGUSTIRA STORE - PREMIUM</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card: #161d2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; overflow-x: hidden; }
        .header { text-align: center; padding: 20px 0; }
        .header h1 { margin: 0; background: linear-gradient(45deg, #00ff88, #60efff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 28px; }
        
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; max-width: 900px; margin: auto; }
        .game-card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid #2d3748; cursor: pointer; transition: 0.3s; position: relative; z-index: 1; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--primary); box-shadow: 0 5px 15px rgba(0,255,136,0.3); }
        .game-card img { width: 100%; height: 160px; object-fit: cover; pointer-events: none; }
        .game-card .title { padding: 10px; text-align: center; font-weight: bold; font-size: 13px; }

        .modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); overflow-y: auto; }
        .modal-content { background: var(--card); margin: 20px auto; padding: 20px; border-radius: 15px; width: 90%; max-width: 450px; border: 1px solid var(--primary); position: relative; }
        
        .pay-methods { display: flex; flex-wrap: wrap; gap: 10px; background: #fff; padding: 12px; border-radius: 10px; margin-bottom: 15px; justify-content: center; }
        .pay-methods img { height: 22px; object-fit: contain; }
        .owner-tag { font-size: 12px; color: var(--primary); text-align: center; margin-top: -10px; margin-bottom: 15px; font-weight: bold; }

        .qr-box { text-align: center; background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .qr-box img { width: 180px; height: auto; border-radius: 5px; }
        .wallet-addr { background: #1e293b; padding: 12px; border-radius: 8px; border: 1px dashed var(--primary); color: #00ff88; font-size: 10px; word-break: break-all; margin-top: 10px; font-family: monospace; }

        label { display: block; margin: 10px 0 5px; color: #a0aec0; font-size: 12px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #2d3748; background: #0b0f1a; color: white; box-sizing: border-box; margin-bottom: 10px; font-size: 14px; }
        
        .btn-order { width: 100%; padding: 15px; border-radius: 8px; border: none; background: var(--primary); color: #000; font-weight: bold; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .btn-close { position: absolute; right: 15px; top: 10px; color: #ff4d4d; background: none; border: none; font-size: 30px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <h1>IGUSTIRA STORE</h1>
    <p style="font-size: 13px; color: #718096;">Pusat Jual Beli Terpercaya Se-Asia Tenggara</p>
</div>

<div class="game-grid">
    <div class="game-card" onclick="openModal('Mobile Legends')">
        <img src="https://gcdn.pbrd.co/images/GZ6fW7R0P6R6.jpg?o=1">
        <div class="title">Mobile Legends</div>
    </div>
    <div class="game-card" onclick="openModal('Free Fire')">
        <img src="https://gcdn.pbrd.co/images/XvX6kI8p1I5m.jpg?o=1">
        <div class="title">Free Fire</div>
    </div>
    <div class="game-card" onclick="openModal('USDT Exchange')">
        <img src="https://gcdn.pbrd.co/images/9Q4aW5X3B4F5.jpg?o=1">
        <div class="title">CV USDT (IDR)</div>
    </div>
</div>

<div id="orderModal" class="modal">
    <div class="modal-content">
        <button class="btn-close" onclick="closeModal()">&times;</button>
        <h3 id="modalTitle" style="color: var(--primary); margin-top:0;">Form Order</h3>

        <div id="payGame" style="display:none;">
            <label>Metode Pembayaran:</label>
            <div class="pay-methods">
                <img src="https://upload.wikimedia.org/wikipedia/id/thumb/e/e0/Logo_BNI.svg/1200px-Logo_BNI.svg.png">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/ad/Bank_Mandiri_logo_2016.svg/1200px-Bank_Mandiri_logo_2016.svg.png">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/72/Logo_dana_blue.svg/1200px-Logo_dana_blue.svg.png">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/8/8e/Gojek_logo_2019.svg/1200px-Gojek_logo_2019.svg.png">
            </div>
            <div class="owner-tag">A/N RANGGA AJI IGUSTIRA</div>
        </div>

        <div id="payUSDT" style="display:none;">
            <label>Scan QR & Transfer (TRC20):</label>
            <div class="qr-box">
                <img src="https://i.ibb.co/LkhKj9d/qr-usdt.png">
                <div class="wallet-addr">TVQQgxUHksSomb99UNTEq3VMFDpDrYpGTH</div>
            </div>
        </div>
        
        <label>Pilih Nominal</label>
        <select id="nominal"></select>

        <div id="formGame">
            <label>User ID</label>
            <input type="text" id="gameID" placeholder="Masukkan ID">
            <label>Server ID</label>
            <input type="text" id="serverID" placeholder="Masukkan Server">
        </div>

        <div id="formUSDT" style="display:none;">
            <label>Bank/E-Wallet Penerima IDR</label>
            <input type="text" id="namaBank" placeholder="BNI / DANA / MANDIRI">
            <label>Nama Pemilik Rekening</label>
            <input type="text" id="namaPemilik" placeholder="Nama Lengkap">
            <label>Nomor Rekening/HP</label>
            <input type="text" id="noRek" placeholder="Nomor Rekening">
        </div>

        <label>Unggah Bukti Transfer</label>
        <input type="file" id="buktiBayar" accept="image/*">

        <button class="btn-order" onclick="kirimOrder()">Konfirmasi Pesanan</button>
    </div>
</div>

<script>
const dataHarga = {
    "Mobile Legends": ["86 Diamonds - Rp 25.000", "172 Diamonds - Rp 50.000", "257 Diamonds - Rp 75.000"],
    "Free Fire": ["70 Diamonds - Rp 10.000", "140 Diamonds - Rp 20.000", "355 Diamonds - Rp 50.000"],
    "USDT Exchange": ["Rate Jual - Rp 16.200", "Rate Beli - Rp 15.800"]
};

let currentService = "";

function openModal(service) {
    currentService = service;
    document.getElementById('modalTitle').innerText = "Order " + service;
    const nomSelect = document.getElementById('nominal');
    nomSelect.innerHTML = "";
    
    dataHarga[service].forEach(item => {
        let opt = document.createElement('option');
        opt.text = item;
        nomSelect.appendChild(opt);
    });

    if(service === "USDT Exchange") {
        document.getElementById('formGame').style.display = "none";
        document.getElementById('formUSDT').style.display = "block";
        document.getElementById('payGame').style.display = "none";
        document.getElementById('payUSDT').style.display = "block";
    } else {
        document.getElementById('formGame').style.display = "block";
        document.getElementById('formUSDT').style.display = "none";
        document.getElementById('payGame').style.display = "block";
        document.getElementById('payUSDT').style.display = "none";
    }

    document.getElementById('orderModal').style.display = "block";
    document.body.style.overflow = "hidden"; // Prevent scroll when modal open
}

function closeModal() { 
    document.getElementById('orderModal').style.display = "none"; 
    document.body.style.overflow = "auto";
}

// Close modal when clicking outside
window.onclick = function(event) {
    if (event.target == document.getElementById('orderModal')) {
        closeModal();
    }
}

function kirimOrder() {
    const nominal = document.getElementById('nominal').value;
    const bukti = document.getElementById('buktiBayar').value;
    if(!bukti) return alert("Wajib upload bukti transfer!");

    let detail = "";
    if(currentService === "USDT Exchange") {
        detail = `Pencairan: ${document.getElementById('namaBank').value}\nNama: ${document.getElementById('namaPemilik').value}\nNo: ${document.getElementById('noRek').value}`;
    } else {
        detail = `ID: ${document.getElementById('gameID').value}\nServer: ${document.getElementById('serverID').value}`;
    }

    const waText = `Halo Boss Rangga,\nOrder: ${currentService}\nNominal: ${nominal}\n\nDetail:\n${detail}\n\n*Bukti bayar terlampir.*`;
    window.location.href = `https://wa.me/6282185160103?text=${encodeURIComponent(waText)}`;
}
</script>
</body>
</html>
