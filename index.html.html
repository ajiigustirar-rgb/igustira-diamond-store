<!DOCTYPE html>
<html>
<head>
    <title>IGUSTIRA STORE</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 20px; }
        .box { background: #2a2a2a; padding: 20px; border-radius: 10px; max-width: 400px; margin: auto; }
        input, select { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #25d366; color: white; border: none; padding: 15px 30px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>

<div class="box">
    <h2>IGUSTIRA STORE</h2>
    <p>Pilih Layanan & Isi Data</p>
    
    <select id="layanan">
        <option value="MLBB">MOBILE LEGENDS</option>
        <option value="FREE FIRE">FREE FIRE</option>
        <option value="PUBG">PUBG MOBILE</option>
        <option value="USDT">CV USDT</option>
    </select>

    <input type="text" id="uId" placeholder="Masukkan ID (Contoh: 12345678)">
    <input type="text" id="zId" placeholder="Masukkan Server (Contoh: 2024)">
    <input type="text" id="qty" placeholder="Jumlah Order (Contoh: 86 Diamonds)">
    <input type="text" id="total" placeholder="Total Harga (Contoh: 20000)">

    <button onclick="send()">PESAN SEKARANG</button>
</div>

<script>
function send() {
    // LINK APPS SCRIPT JURAGAN
    const url = "https://script.google.com/macros/s/AKfycbxxeJjjKQ7NZkm5Ctw1HGpC0vcRtOz1t2O-CK7dr-8wz_UKOm2IxFH6eG1k3sOgb0UKGw/exec";
    
    let layanan = document.getElementById('layanan').value;
    let uId = document.getElementById('uId').value;
    let zId = document.getElementById('zId').value;
    let qtyVal = document.getElementById('qty').value;
    let totalVal = document.getElementById('total').value;
    let detailAkun = uId + " (" + zId + ")";

    // Kirim ke Google Sheets
    fetch(url, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            "service": layanan,
            "qty": qtyVal,
            "account": detailAkun,
            "total": totalVal
        })
    });

    // Pindah ke WA
    setTimeout(function(){
        let pesanWA = `Halo Bos Igustira, Pesanan Baru!\nLayanan: ${layanan}\nDetail: ${detailAkun}\nJumlah: ${qtyVal}\nTotal: ${totalVal}`;
        window.location.href = `https://wa.me/6282185160103?text=${encodeURIComponent(pesanWA)}`;
    }, 1000);
}
</script>

</body>
</html>
