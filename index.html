<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGUSTIRA STORE - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background: #0b0e23; color: white; font-family: 'Orbitron', sans-serif; margin: 0; padding: 20px; }
        .store-container { max-width: 500px; margin: auto; text-align: center; }
        .menu-item { 
            background: #161b33; 
            border: 1px solid #2d3450; 
            border-radius: 12px; 
            padding: 15px 20px; 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .menu-item:active { transform: scale(0.98); }
        .badge { 
            width: 35px; 
            height: 35px; 
            border-radius: 8px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: 900; 
            font-size: 10px; 
        }
        .price-text { font-family: 'monospace'; font-weight: bold; color: #ffffff; font-size: 14px; }
    </style>
</head>
<body>
    <div class="store-container">
        <h1 class="text-2xl font-black italic text-blue-400 tracking-wider mb-1">IGUSTIRA STORE</h1>
        <p class="text-[8px] text-gray-400 tracking-[0.2em] mb-6 uppercase">Pusat Jual Beli Terpercaya Se-Asia Tenggara</p>

        <div class="bg-blue-900/20 p-4 rounded-lg mb-8 border border-blue-500/30">
            <p class="text-[10px] font-bold">HAI SELAMAT DATANG DI IGUSTIRA STORE JURAGAN</p>
            <p class="text-[8px] text-blue-300 mt-1 uppercase">Juragan ingin pesan apa biar kami bantu</p>
        </div>

        <div id="main-menu">
            <div onclick="window.location.href='https://wa.me/6282185160103?text=Halo+Bos+Igustira,+Order+MLBB'" class="menu-item">
                <span class="text-xs font-bold uppercase">MLBB</span>
                <div class="badge bg-blue-600">ML</div>
            </div>

            <div onclick="window.location.href='https://wa.me/6282185160103?text=Halo+Bos+Igustira,+Order+FREE+FIRE'" class="menu-item">
                <span class="text-xs font-bold uppercase">FREE FIRE</span>
                <div class="badge bg-orange-600">FF</div>
            </div>

            <div onclick="window.location.href='https://wa.me/6282185160103?text=Halo+Bos+Igustira,+Tukar+BNB'" class="menu-item">
                <div>
                    <span class="text-xs font-bold uppercase block text-left">BNB</span>
                    <span id="bnb-price" class="price-text">Memuat...</span>
                </div>
                <div class="badge bg-yellow-500 text-black">BNB</div>
            </div>

            <div onclick="window.location.href='https://wa.me/6282185160103?text=Halo+Bos+Igustira,+Tukar+XRP'" class="menu-item">
                <div>
                    <span class="text-xs font-bold uppercase block text-left">XRP</span>
                    <span id="xrp-price" class="price-text">Memuat...</span>
                </div>
                <div class="badge bg-white text-black">XRP</div>
            </div>

            <div onclick="window.location.href='https://wa.me/6282185160103?text=Halo+Bos+Igustira,+Tukar+USDT'" class="menu-item">
                <div>
                    <span class="text-xs font-bold uppercase block text-left">CV USDT</span>
                    <code class="text-[8px] text-emerald-400">TCokCTEWrqgJTEpWcmSqpj5chiMH5be2o4</code>
                </div>
                <div class="badge bg-emerald-500">U</div>
            </div>
        </div>

        <p class="text-[8px] text-gray-600 mt-10 italic uppercase">Owner: Rangga Aji Igustira</p>
    </div>

    <script>
        async function fetchPrices() {
            try {
                const r = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BNBUSDT","XRPUSDT"]');
                const d = await r.json();
                document.getElementById('bnb-price').innerText = '$' + parseFloat(d.find(i=>i.symbol==='BNBUSDT').price).toFixed(2);
                document.getElementById('xrp-price').innerText = '$' + parseFloat(d.find(i=>i.symbol==='XRPUSDT').price).toFixed(4);
            } catch(e) { console.log("Price update error"); }
        }
        setInterval(fetchPrices, 60000); // Update setiap 1 menit (60000ms)
        fetchPrices();
    </script>
</body>
</html>
