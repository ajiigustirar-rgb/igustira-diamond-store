<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGUSTIRA STORE - OFFICIAL</title>
    <style>
        :root { --primary: #00ff88; --bg: #0b0f1a; --card-bg: #1c2437; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; max-width: 1000px; margin: auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; text-align: center; cursor: pointer; border: 1px solid #323f58; transition: 0.3s; }
        .card:hover { border-color: var(--primary); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); padding: 20px; box-sizing: border-box; }
        .modal-content { background: var(--card-bg); max-width: 400px; margin: 50px auto; padding: 20px; border-radius: 20px; }
        input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 10px; border: none; }
        .btn-submit { background: var(--primary); font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<h1 style="text-align:center;">IGUSTIRA STORE</h1>
<div class="grid" id="daftarGame">
    </div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h2 id="titleModal">Order</h2>
        <input type="text" id="nama" placeholder="Nama Lengkap">
        <input type="text" id="userId" placeholder="User ID">
        <button class="btn-submit" onclick="kirimData()">KONFIRMASI & SELESAI</button>
        <button onclick="document.getElementById('modal').style.display='none'">Batal</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDFZVOrLwcCjdKVWFSeNz8LVBIVxidtMkA",
        projectId: "igustira-store"
    };
    const db = getFirestore(initializeApp(firebaseConfig));

    window.db = db;
    window.addDoc = addDoc;
    window.collection = collection;
</script>

<script>
    const games = ["CV USDT", "MOBILE LEGENDS", "FREE FIRE", "PUBG MOBILE", "HONOR OF KINGS", "GENSHIN IMPACT", "VALORANT", "CALL OF DUTY MOBILE", "EA SPORTS FC MOBILE", "ROBLOX", "EFOOTBALL PES", "METAL SLUG: AWAKENING", "CLASH OF CLANS", "BLACK CLOVER M", "NIKKE", "BLUE ARCHIVE", "POINT BLANK", "GROWTOPIA"];
    
    let gameDipilih = "";
    const container = document.getElementById('daftarGame');

    games.forEach(g => {
        container.innerHTML += `<div class="card" onclick="openModal('${g}')"><h3>${g}</h3></div>`;
    });

    function openModal(g) { gameDipilih = g; document.getElementById('titleModal').innerText = g; document.getElementById('modal').style.display = "block"; }

    async function kirimData() {
        const nama = document.getElementById('nama').value;
        const id = document.getElementById('userId').value;
        if(!nama || !id) return alert("Isi data!");

        try {
            await addDoc(collection(window.db, "pesanan"), { nama, id, game: gameDipilih, tgl: new Date() });
            alert("Pesanan berhasil dikirim ke Admin & Firebase!");
            document.getElementById('modal').style.display = "none";
        } catch(e) { alert("Gagal: " + e.message); }
    }
</script>
</body>
</html>
